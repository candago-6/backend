services:
  db:
    image: postgres:16-alpine
    container_name: assistente_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-admin123}
      POSTGRES_DB: ${POSTGRES_DB:-assistente_whatsapp}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - assistente-whatsapp-net

  pln-pipeline:
    container_name: pln_pipeline
    restart: unless-stopped
    build:
      context: ./services/pln_pipeline
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    networks:
      - assistente-whatsapp-net

  service-manager:
    container_name: service_manager
    restart: unless-stopped
    build:
      context: ./services/service_manager
      dockerfile: Dockerfile
    ports:
      - "8002:8002"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-admin}:${POSTGRES_PASSWORD:-admin123}@db:5432/${POSTGRES_DB:-assistente_whatsapp}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-v6u6W5q7U5p4S3Y2X1W0V9U8T7S6R5Q4P3O2N1M0L8k=} # Chave Fernet de 32 bytes (44 chars base64)
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@procon.sp.gov.br}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
      BOT_URL: ${BOT_URL:-http://whatsapp-bot:8003}
      BOT_SECRET: ${BOT_SECRET:-dev-bot-secret-change-me}
    depends_on:
      - db
    networks:
      - assistente-whatsapp-net

  whatsapp-bot:
    container_name: whatsapp_bot
    restart: unless-stopped
    build:
      context: ./services/whatsapp_bot
      dockerfile: Dockerfile
    ports:
      - "8003:8003"
    environment:
      PLN_URL: http://pln-pipeline:8001/api/distilbert
      MANAGER_URL: http://service-manager:8002/api/v1
      BOT_SECRET: ${BOT_SECRET:-dev-bot-secret-change-me}
    volumes:
      - wa_session:/app/.wwebjs_auth
    networks:
      - assistente-whatsapp-net

networks:
  assistente-whatsapp-net:
    driver: bridge

volumes:
  postgres_data:
  wa_session:
